name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install '.[dev]'

      - name: Lint notebooks
        run: nbqa ruff notebooks/

      - name: Lint Python files
        run: ruff check .
